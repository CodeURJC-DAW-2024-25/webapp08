{{>header}}

<!-- BREADCRUMB -->
<div id="breadcrumb" class="section">
	<!-- container -->
	<div class="container">
		<!-- row -->
		<div class="row">
			<div class="col-md-12">
				<ul class="breadcrumb-tree">
					<li><a href="#">Home</a></li>
					<li><a href="#">Account</a></li>
					<li><a href="#">Your product</a></li>
				</ul>
			</div>
		</div>
		<!-- /row -->
	</div>
	<!-- /container -->
</div>
<!-- /BREADCRUMB -->

<!-- SECTION -->
<div class="section">
	<!-- container -->
	<div class="container">
		<!-- row -->
		<div class="row">
			

			<!-- STORE -->
			<div id="store" class="col-md-12">

				<!-- store products -->
				<div class="row" id="yourProdsRow">
					{{#productos}}
					<!-- product -->
					<div class="col-md-4 col-xs-6">
						<div class="product">
							<div class="product-img">
								<img src="./img/product01.png" alt="">
								<div class="product-label">
									<span class="new">NEW</span>
								</div>
							</div>
							<div class="product-body">
								<p class="product-category">Category</p>
								<h3 class="product-name"><a href="#">{{datos}}</a></h3>
								<h4 class="product-price">inicia en: {{valorIni}}€</h4>
								<div class="product-btns">
									<button class="add-to-wishlist"><i class="fa fa-heart-o"></i><span class="tooltipp">add to wishlist</span></button>
									<button class="add-to-compare"><i class="fa fa-exchange"></i><span class="tooltipp">add to compare</span></button>
									<button class="quick-view"><i class="fa fa-eye"></i><span class="tooltipp">quick view</span></button>
								</div>
							</div>
							<div class="col-md-6">
								<div class="add-to-cart">
									<button class="add-to-cart-btn"></i> Rate</button>
								</div>
							</div>
							<div class="col-md-6">
								<div class="add-to-cart">
									<button class="add-to-cart-btn"></i> Eliminate</button>
								</div>
							</div>
						</div>
					</div>
					<!-- /product -->
					{{/productos}}
					{{^productos}}
						<p>nada gang</p>
					{{/productos}}
				</div>
				<!-- /store products -->

				<!-- store bottom filter -->
				<div class="text-center">
					<button id="load-more-yposts" class="btn btn-danger">Cargar Más</button>
					<div id="spinnerY" class="spinner-border text-primary d-block mx-auto" role="status" style="display: none !important; visibility: hidden;">
						<span class="visually-hidden">Cargando...</span>
					</div>
				</div>
				
				
				<!-- /store bottom filter -->
			</div>
			<!-- /STORE -->
		</div>
		<!-- /row -->
	</div>
	<!-- /container -->
</div>
<!-- /SECTION -->

{{>footer}}
